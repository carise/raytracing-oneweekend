repos:
  - repo: local
    hooks:
      - id: make-clean
        name: Run Make Clean
        entry: make -C exercises/ clean
        language: system
        always_run: true
        pass_filenames: false

      - id: clang-format
        name: Run Clang Format
        entry: clang-format -i
        language: system
        files: \.(c|cc|cxx|cpp|h|hpp|hxx)$
